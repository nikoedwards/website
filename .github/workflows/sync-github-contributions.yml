name: Sync GitHub Contributions

on:
  workflow_dispatch:
  schedule:
    - cron: "29 0 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate contribution graph
        run: node scripts/sync-github-contributions.mjs

      - name: Commit contribution graph
        run: |
          if git diff --quiet -- contributions.svg; then
            echo "No contribution graph changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contributions.svg
          git commit -m "Sync GitHub contributions"
          git push
